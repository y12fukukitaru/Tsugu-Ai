<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tsugu | Phase 9（ダッシュボード充実）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--navy:#1C3557;--blue:#2C6EBD;--sky:#4AADD6;--gold:#C89620;--ink:#131E2E;--muted:#4A6080;--line:#D0DCF0;--bg:#F2F5FA;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans JP',sans-serif;color:var(--ink);background:var(--bg);}
  .gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:auto;padding:24px;
    background:radial-gradient(900px 520px at 82% -8%,rgba(74,173,214,.20),transparent 60%),radial-gradient(820px 480px at -5% 110%,rgba(200,150,32,.16),transparent 55%),#0F2035;}
  .card{background:#fff;border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.38);max-width:430px;width:100%;padding:32px 30px;max-height:94vh;overflow:auto;}
  .brand{display:inline-flex;align-items:center;gap:9px;}
  .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(140deg,var(--sky),var(--navy));display:flex;align-items:center;justify-content:center;}
  .logo svg{width:20px;height:20px;fill:#fff;}
  .name{font-family:'DM Sans',sans-serif;font-size:30px;font-weight:500;color:var(--navy);}
  .tabs{display:flex;border-bottom:1px solid var(--line);margin:20px 0 18px;}
  .tab{flex:1;text-align:center;padding:9px 0;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#8AA0BE;font-weight:500;}
  .tab.on{color:var(--navy);border-bottom-color:var(--blue);font-weight:600;}
  .field{margin-bottom:14px;}
  .field label{font-size:12px;font-weight:700;color:var(--navy);display:block;margin:0 0 6px;}
  .inp{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#F2F5FA;color:var(--ink);outline:none;}
  .inp:focus{border-color:var(--blue);background:#fff;}
  .btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;font-weight:700;font-size:15px;border:none;border-radius:11px;cursor:pointer;margin-top:6px;font-family:inherit;}
  .btn:disabled{opacity:.6;cursor:default;}
  .link{font-size:12px;color:var(--blue);cursor:pointer;text-align:center;margin-top:14px;}
  .link:hover{text-decoration:underline;}
  .msg{font-size:12px;margin-top:10px;min-height:16px;line-height:1.5;}
  .hint{font-size:11px;color:#8AA0BE;margin-top:4px;line-height:1.5;}
  .show{font-size:11px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:5px;cursor:pointer;}
  .note{margin-top:18px;font-size:11px;color:#8AA0BE;background:#F2F5FA;border-radius:9px;padding:10px 13px;line-height:1.65;}
  .topbar{position:fixed;top:0;left:0;right:0;height:48px;background:#0F2035;display:flex;align-items:center;gap:10px;padding:0 18px;z-index:10;}
  .topbar .tname{color:#fff;font-weight:600;font-size:15px;font-family:'DM Sans',sans-serif;}
  .rolebadge{font-size:11px;font-weight:600;padding:3px 11px;border-radius:99px;}
  .spacer{height:48px;}
  .wrap{max-width:880px;margin:0 auto;padding:28px 20px;}
  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin-bottom:16px;}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 11px;border-radius:99px;background:#E6F1FB;color:var(--blue);}
  .kv{font-size:13px;color:var(--muted);line-height:1.9;}
  .kv b{color:var(--ink);}
  .ph{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:8px;}
  .fl{font-size:11px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px;}
  .inp2{width:140px;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit;background:#fff;outline:none;}
  .inp2:focus{border-color:var(--blue);}
  .btn2{padding:9px 18px;background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;font-weight:600;font-size:13px;border:none;border-radius:9px;cursor:pointer;font-family:inherit;}
  .clrow{padding:9px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
  .clrow:hover{border-color:var(--blue);background:#F6FAFE;}
  .switch{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .sbtn{padding:8px 16px;border:1.5px solid var(--line);background:#fff;border-radius:9px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--muted);}
  .sbtn.on{border-color:var(--blue);background:var(--blue);color:#fff;font-weight:600;}
  .ghost{background:none;border:none;color:#4AADD6;font-size:12px;cursor:pointer;font-family:inherit;}
  table.ft{width:100%;border-collapse:collapse;font-size:12px;}
  table.ft th{color:#8AA0BE;text-align:left;font-weight:600;padding:6px 4px;}
  table.ft td{padding:6px 4px;border-top:1px solid #EAF0F7;}
  .hidden{display:none!important;}
  #app{display:flex;min-height:100vh;align-items:stretch;}
  .sb{width:236px;flex-shrink:0;background:#0F2035;color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .sb-logo{padding:18px 18px 10px;}
  .logo-row{display:flex;align-items:center;gap:9px;}
  .logo-ico{width:32px;height:32px;border-radius:9px;background:linear-gradient(140deg,var(--sky),var(--navy));display:flex;align-items:center;justify-content:center;}
  .logo-ico svg{width:18px;height:18px;fill:#fff;}
  .logo-nm{font-family:'DM Sans',sans-serif;font-size:22px;font-weight:500;}
  .logo-tg{font-size:10px;color:rgba(255,255,255,.5);margin-top:6px;line-height:1.4;}
  .sb-co{padding:10px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08);}
  .co-nm{font-size:13px;font-weight:600;}
  .plan-pill{display:inline-block;margin-top:6px;font-size:10px;font-weight:600;padding:2px 9px;border-radius:99px;background:rgba(74,173,214,.2);color:#9FD2EA;}
  .sb-nav{flex:1;padding:12px 10px;}
  .sb-sec{font-size:10px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:.04em;margin:6px 8px 6px;}
  .ni{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;font-size:13px;color:rgba(255,255,255,.8);cursor:pointer;margin-bottom:2px;}
  .ni:hover{background:rgba(255,255,255,.06);color:#fff;}
  .ni.active{background:var(--blue);color:#fff;font-weight:600;}
  .sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);}
  .sb-email{display:block;font-size:11px;color:rgba(255,255,255,.6);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sb-out{width:100%;padding:8px;background:rgba(255,255,255,.08);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;}
  .sb-out:hover{background:rgba(255,255,255,.16);}
  .main2{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar2{height:56px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:5;}
  .greet{font-size:15px;font-weight:600;color:var(--navy);}
  .datechip{margin-left:auto;font-size:12px;color:var(--muted);background:#F2F5FA;padding:5px 12px;border-radius:99px;}
  @media(max-width:760px){#app{flex-direction:column;}.sb{width:100%;height:auto;position:static;}.sb-nav{display:flex;flex-wrap:wrap;gap:4px;}.sb-sec{width:100%;}.ni{flex:0 0 auto;margin-bottom:0;}}
</style>
</head>
<body>

<!-- ===== AUTH GATE ===== -->
<div id="gate" class="gate">
  <div class="card">
    <div style="text-align:center;">
      <div class="brand">
        <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg></div>
        <div class="name">Tsugu</div>
      </div>
      <div style="font-size:12px;color:#8AA0BE;margin-top:4px;">Phase 9 — ダッシュボード充実（KPI・要対応・専門AI）</div>
    </div>

    <div class="tabs">
      <div id="tab-login" class="tab on" onclick="showTab('login')">ログイン</div>
      <div id="tab-signup" class="tab" onclick="showTab('signup')">新規登録</div>
      <div id="tab-reset" class="tab" onclick="showTab('reset')">再設定</div>
    </div>

    <div id="panel-login">
      <div class="field"><label>メールアドレス</label><input id="login-email" class="inp" type="email" placeholder="you@example.com" autocomplete="off"></div>
      <div class="field"><label>パスワード</label><input id="login-pw" class="inp" type="password" placeholder="パスワード" autocomplete="off"></div>
      <div class="show"><input type="checkbox" onchange="document.getElementById('login-pw').type=this.checked?'text':'password'"> パスワードを表示</div>
      <button class="btn" id="login-btn" onclick="doLogin()">ログイン</button>
      <div id="msg-login" class="msg"></div>
      <div class="link" onclick="showTab('reset')">パスワードをお忘れですか？</div>
    </div>

    <div id="panel-signup" class="hidden">
      <div class="field"><label>メールアドレス</label><input id="signup-email" class="inp" type="email" placeholder="you@example.com" autocomplete="off"></div>
      <div class="field"><label>パスワード</label><input id="signup-pw" class="inp" type="password" placeholder="パスワード" autocomplete="off"></div>
      <div class="hint">※ 大文字・小文字・数字をすべて含む8文字以上</div>
      <div class="field" style="margin-top:14px;"><label>パスワード（確認）</label><input id="signup-pw2" class="inp" type="password" placeholder="もう一度入力" autocomplete="off"></div>
      <div class="show"><input type="checkbox" onchange="var t=this.checked?'text':'password';document.getElementById('signup-pw').type=t;document.getElementById('signup-pw2').type=t;"> パスワードを表示</div>
      <button class="btn" id="signup-btn" onclick="doSignup()">登録してはじめる</button>
      <div id="msg-signup" class="msg"></div>
    </div>

    <div id="panel-reset" class="hidden">
      <div class="hint" style="margin-bottom:14px;">登録済みのメールアドレスに、パスワード再設定用のリンクを送信します。</div>
      <div class="field"><label>登録メールアドレス</label><input id="reset-email" class="inp" type="email" placeholder="you@example.com" autocomplete="off"></div>
      <button class="btn" id="reset-btn" onclick="doReset()">再設定メールを送る</button>
      <div id="msg-reset" class="msg"></div>
      <div class="link" onclick="showTab('login')">ログインに戻る</div>
    </div>

    <div id="panel-recovery" class="hidden">
      <div class="hint" style="margin-bottom:14px;">新しいパスワードを設定してください。</div>
      <div class="field"><label>新しいパスワード</label><input id="rec-pw" class="inp" type="password" placeholder="新しいパスワード" autocomplete="off"></div>
      <div class="hint">※ 大文字・小文字・数字をすべて含む8文字以上</div>
      <div class="field" style="margin-top:14px;"><label>新しいパスワード（確認）</label><input id="rec-pw2" class="inp" type="password" placeholder="もう一度入力" autocomplete="off"></div>
      <button class="btn" id="rec-btn" onclick="doUpdatePassword()">パスワードを更新</button>
      <div id="msg-recovery" class="msg"></div>
    </div>

    <div class="note">Supabaseの本物の認証に接続しています（プロジェクト yaururnkxjhtiowkpvyu）。</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hidden">
  <aside class="sb">
    <div class="sb-logo">
      <div class="logo-row"><div class="logo-ico"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg></div><span class="logo-nm">Tsugu</span></div>
      <div class="logo-tg">AIと人による伴走型経営支援</div>
    </div>
    <div class="sb-co"><div id="sb-co-nm" class="co-nm">—</div><span id="app-role" class="plan-pill"></span></div>
    <nav id="app-nav" class="sb-nav"></nav>
    <div class="sb-foot"><span id="app-email" class="sb-email"></span><button class="sb-out" onclick="signOut()">ログアウト</button></div>
  </aside>
  <main class="main2">
    <div class="topbar2"><div id="app-greet" class="greet">ダッシュボード</div><div id="app-date" class="datechip"></div></div>
    <div class="wrap" id="app-body"></div>
  </main>
</div>

<script>
  const SUPABASE_URL = 'https://yaururnkxjhtiowkpvyu.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_-k-OPNThdG0uElX0h36eug_oGaCNlL4';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { flowType: 'implicit', detectSessionInUrl: true, persistSession: true, autoRefreshToken: true } });

  let ME = null, MYROLE = 'customer', CURRENT_CLIENT = null;

  const $ = function(id){ return document.getElementById(id); };
  function validPw(p){ return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/.test(p); }
  function validEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
  function setMsg(which, txt, ok){ var e=$('msg-'+which); if(!e)return; e.textContent=txt||''; e.style.color=ok?'#1E6B45':'#A83030'; }
  function esc(s){ s=(s==null?'':String(s)); return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escA(s){ return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

  var PANELS=['login','signup','reset','recovery'];
  function showTab(which){
    PANELS.forEach(function(t){
      var p=$('panel-'+t); if(p)p.classList.toggle('hidden', t!==which);
      var b=$('tab-'+t); if(b)b.classList.toggle('on', t===which);
      setMsg(t,'');
    });
  }
  function showRecovery(){ $('gate').classList.remove('hidden'); $('app').classList.add('hidden'); PANELS.forEach(function(t){ var p=$('panel-'+t); if(p)p.classList.toggle('hidden', t!=='recovery'); }); }
  function showAuth(){ $('app').classList.add('hidden'); $('gate').classList.remove('hidden'); showTab('login'); }

  async function doSignup(){
    var em=($('signup-email').value||'').trim().toLowerCase();
    var pw=$('signup-pw').value||'', pw2=$('signup-pw2').value||'';
    if(!validEmail(em)){ setMsg('signup','正しいメールアドレスを入力してください'); return; }
    if(!validPw(pw)){ setMsg('signup','パスワードは大文字・小文字・数字を含む8文字以上にしてください'); return; }
    if(pw!==pw2){ setMsg('signup','パスワード（確認）が一致しません'); return; }
    var btn=$('signup-btn'); btn.disabled=true;
    var res=await sb.auth.signUp({ email:em, password:pw });
    btn.disabled=false;
    if(res.error){ setMsg('signup','登録エラー：'+res.error.message); return; }
    if(res.data && res.data.session){ await routeFromSession(res.data.session); return; }
    setMsg('signup','確認メールを送信しました。メール確認をオフにすると即ログインできます。', true);
    showTab('login'); $('login-email').value=em;
  }

  async function doLogin(){
    var em=($('login-email').value||'').trim().toLowerCase();
    var pw=$('login-pw').value||'';
    if(!em||!pw){ setMsg('login','メールアドレスとパスワードを入力してください'); return; }
    var btn=$('login-btn'); btn.disabled=true;
    var res=await sb.auth.signInWithPassword({ email:em, password:pw });
    btn.disabled=false;
    if(res.error){
      var m=res.error.message||'';
      if(/not confirmed/i.test(m)) setMsg('login','メールが未確認です。Supabase側でメール確認をオフにしてください');
      else if(/Invalid/i.test(m)) setMsg('login','メールアドレスまたはパスワードが違います');
      else setMsg('login','ログインエラー：'+m);
      return;
    }
    await routeFromSession(res.data.session);
  }

  async function doReset(){
    var em=($('reset-email').value||'').trim().toLowerCase();
    if(!validEmail(em)){ setMsg('reset','正しいメールアドレスを入力してください'); return; }
    var btn=$('reset-btn'); btn.disabled=true;
    var res=await sb.auth.resetPasswordForEmail(em, { redirectTo: window.location.href.split('#')[0] });
    btn.disabled=false;
    if(res.error){ setMsg('reset','送信エラー：'+res.error.message); return; }
    setMsg('reset','再設定メールを送信しました。メール内のリンクから新パスワードを設定してください。', true);
  }

  async function doUpdatePassword(){
    var pw=$('rec-pw').value||'', pw2=$('rec-pw2').value||'';
    if(!validPw(pw)){ setMsg('recovery','パスワードは大文字・小文字・数字を含む8文字以上にしてください'); return; }
    if(pw!==pw2){ setMsg('recovery','パスワード（確認）が一致しません'); return; }
    var btn=$('rec-btn'); btn.disabled=true;
    var res=await sb.auth.updateUser({ password: pw });
    btn.disabled=false;
    if(res.error){ setMsg('recovery','更新エラー：'+res.error.message); return; }
    setMsg('recovery','パスワードを更新しました。', true);
    var s=await sb.auth.getSession();
    if(s.data && s.data.session) await routeFromSession(s.data.session);
  }

  async function signOut(){
    await sb.auth.signOut();
    ['login-pw','signup-email','signup-pw','signup-pw2','reset-email','rec-pw','rec-pw2'].forEach(function(id){ var e=$(id); if(e)e.value=''; });
    ME=null; showAuth();
  }

  async function getProfile(session){
    var uid=session.user.id, email=session.user.email;
    var q=await sb.from('profiles').select('role,full_name,email,company_name,contact_name').eq('id',uid).maybeSingle();
    var prof=q.data;
    if(!prof){
      var up=await sb.from('profiles').upsert({ id:uid, email:email, role:'customer' }).select('role,full_name,email').maybeSingle();
      prof=up.data || { role:'customer', email:email, full_name:null };
    }
    return prof;
  }

  async function routeFromSession(session){
    if(!session){ showAuth(); return; }
    ME=session.user.id;
    var prof=await getProfile(session);
    MYROLE=prof.role||'customer';
    renderApp(prof, session.user.email);
  }

  function roleLabel(r){ return r==='consultant'?'コンサル':(r==='admin'?'運営':'顧客'); }
  function roleColor(r){ return r==='consultant'?'#2C6EBD':(r==='admin'?'#C89620':'#1E6B45'); }
  function buildNav(r){
    var nav=$('app-nav'); if(!nav)return;
    var items = r==='customer'
      ? [['sec-flow','ダッシュボード'],['sec-company','会社・財務'],['sec-ai','AI診断・自動化'],['sec-ins','保険試算'],['sec-ma','M&A活用'],['sec-sec','AI秘書']]
      : [['sec-flow','ダッシュボード'],['sec-clients','担当顧客'],['sec-sec','AI秘書']];
    var h='<div class="sb-sec">メニュー</div>';
    items.forEach(function(it,i){ h+='<div class="ni'+(i===0?' active':'')+'" onclick="goSec(\''+it[0]+'\',this)">'+it[1]+'</div>'; });
    nav.innerHTML=h;
  }
  function goSec(id,el){ var t=$(id); if(t) t.scrollIntoView({behavior:'smooth',block:'start'}); var nav=$('app-nav'); if(nav){ Array.prototype.forEach.call(nav.querySelectorAll('.ni'),function(n){ n.classList.remove('active'); }); } if(el) el.classList.add('active'); }

  function renderApp(prof, email){
    $('gate').classList.add('hidden');
    $('app').classList.remove('hidden');
    var r=prof.role||'customer';
    SEC_MSGS=[]; SEC_MODE='経営';
    var rb=$('app-role'); rb.textContent=roleLabel(r); rb.style.background=roleColor(r); rb.style.color='#fff';
    $('app-email').textContent=email||'';
    buildNav(r);
    var g=$('app-greet'); if(g) g.textContent = r==='customer'?'経営者ダッシュボード':(r==='admin'?'運営コンソール':'コンサルポータル');
    var cn=$('sb-co-nm'); if(cn) cn.textContent = (prof.company_name||'—');
    var dc=$('app-date'); if(dc){ var d=new Date(); dc.textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'; }

    var view='';
    if(r==='customer'){

  async function setRole(r){
    var s=await sb.auth.getSession();
    if(!(s.data && s.data.session)) return;
    var res=await sb.from('profiles').update({ role:r }).eq('id', s.data.session.user.id);
    if(res.error){ alert('役割の更新に失敗しました：'+res.error.message); return; }
    routeFromSession(s.data.session);
  }

  // ---- finance (customer writes / consultant reads) ----
  function kpiCards(rows){
    if(!rows||!rows.length) return '<div style="font-size:12px;color:#8AA0BE;">「月次財務メモ」に入力すると、ここに売上・利益のサマリーが表示されます。</div>';
    var cur=rows[0], prev=rows[1]||null;
    function pct(a,b){ if(b==null||b===0||a==null) return null; return (a-b)/Math.abs(b)*100; }
    function mom(v){ if(v==null) return ''; var up=v>=0; return '<span style="font-size:11px;color:'+(up?'#1E6B45':'#A83030')+';">前月比 '+(up?'+':'')+v.toFixed(1)+'%</span>'; }
    var rev=cur.revenue, prof=cur.profit;
    var margin=(rev!=null&&rev!==0&&prof!=null)?(prof/rev*100):null;
    function card(lbl,val,sub){ return '<div style="flex:1 1 150px;min-width:150px;background:#F7FAFD;border:1px solid #EAF0F7;border-radius:11px;padding:14px 16px;"><div style="font-size:12px;color:#4A6080;">'+lbl+'</div><div style="font-size:22px;font-weight:600;color:#1C3557;margin-top:2px;">'+val+'</div><div style="margin-top:3px;">'+(sub||'')+'</div></div>'; }
    return '<div style="font-size:11px;color:#8AA0BE;margin-bottom:10px;">最新月：'+esc(cur.year_month)+'</div>'
      +'<div style="display:flex;gap:10px;flex-wrap:wrap;">'
      +card('売上', rev==null?'-':Number(rev).toLocaleString('ja-JP')+' 万円', prev?mom(pct(rev,prev.revenue)):'')
      +card('営業利益', prof==null?'-':Number(prof).toLocaleString('ja-JP')+' 万円', prev?mom(pct(prof,prev.profit)):'')
      +card('営業利益率', margin==null?'-':margin.toFixed(1)+' %', '')
      +'</div>';
  }
  function todoCards(rows){
    var open=(rows||[]).filter(function(r){ return r.status!=='done'; });
    if(!open.length) return '<div style="font-size:12px;color:#8AA0BE;">未対応の課題はありません。</div>';
    open.sort(function(a,b){ return (a.due_date||'9999').localeCompare(b.due_date||'9999'); });
    var today=new Date().toISOString().slice(0,10);
    var h='<div style="font-size:12px;color:#4A6080;margin-bottom:8px;">未対応 '+open.length+' 件</div>';
    open.forEach(function(r){
      var over = r.due_date && r.due_date < today;
      var due = r.due_date ? ('期限 '+r.due_date+(over?'（超過）':'')) : '期限なし';
      h+='<div style="display:flex;align-items:center;gap:10px;border-left:3px solid '+(over?'#A83030':'#C89620')+';background:#FFFBF3;border-radius:8px;padding:9px 12px;margin-bottom:6px;"><span style="flex:1;font-size:13px;color:#131E2E;">'+esc(r.title)+'</span><span style="font-size:11px;color:'+(over?'#A83030':'#8A6D20')+';white-space:nowrap;">'+esc(due)+'</span></div>';
    });
    return h;
  }
  function finTable(rows, editable){
    if(!rows || !rows.length) return '<div style="font-size:12px;color:#8AA0BE;">まだデータがありません。</div>';
    var h='<table class="ft"><tr><th>年月</th><th>売上</th><th>営業利益</th><th>メモ</th>'+(editable?'<th></th>':'')+'</tr>';
    rows.forEach(function(r){
      h+='<tr><td>'+esc(r.year_month)+'</td>'
        +'<td>'+(r.revenue==null?'-':esc(r.revenue))+'</td>'
        +'<td>'+(r.profit==null?'-':esc(r.profit))+'</td>'
        +'<td style="color:#4A6080;">'+esc(r.memo||'')+'</td>'
        +(editable?'<td style="text-align:right;"><span onclick="delFinance(\''+r.id+'\')" style="color:#A83030;cursor:pointer;font-size:11px;">削除</span></td>':'')
        +'</tr>';
    });
    return h+'</table>';
  }

  var aiSelected={};
  function buildAiChips(){
    var box=$('ai-chips'); if(!box)return; aiSelected={}; box.innerHTML='';

  var __aiSeq=0;
  function aiCards(txt, selectable){
    var arr=null;
    try{ var s=txt.indexOf('['), e=txt.lastIndexOf(']'); if(s>=0&&e>s) arr=JSON.parse(txt.slice(s,e+1)); }catch(err){ arr=null; }
    if(!arr||!arr.length) return '<div style="white-space:pre-wrap;font-size:13px;color:#131E2E;line-height:1.7;">'+esc(txt)+'</div>';
    var rank={'高':0,'中':1,'低':2};
    arr.sort(function(a,b){ var ra=rank[a['優先度']], rb=rank[b['優先度']]; return (ra==null?9:ra)-(rb==null?9:rb); });
    if(selectable) window.__lastProps=arr;
    var pfx='aic'+(++__aiSeq)+'_';
    function pc(p){ return p==='高'?'#C89620':(p==='中'?'#2C6EBD':'#8AA0BE'); }
    function dc(d){ return d==='低'?'#1E6B45':(d==='高'?'#A83030':'#C89620'); }
    function bdg(t,c){ return '<span style="font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;background:'+c+'22;color:'+c+';white-space:nowrap;">'+esc(t)+'</span>'; }
    function rw(l,v){ if(!v)return ''; return '<div style="font-size:12px;line-height:1.65;margin-bottom:4px;"><span style="color:#8AA0BE;font-weight:600;">'+l+'：</span><span style="color:#1C3557;">'+esc(v)+'</span></div>'; }
    var h='<div style="font-size:12px;color:#4A6080;margin:2px 0 12px;">'+arr.length+'件の自動化候補（優先度順／タップで詳細）'+(selectable?'。興味のある項目にチェック':'')+'</div>';
    arr.forEach(function(it, i){
      var pr=it['優先度']||'-', df=it['難易度']||'-';
      var chk = selectable ? '<label style="cursor:pointer;" onclick="event.stopPropagation()"><input type="checkbox" class="ai-pick" data-i="'+i+'"></label>' : '';
      h+='<div style="border:1px solid #D0DCF0;border-radius:11px;margin-bottom:8px;overflow:hidden;">'
        +'<div onclick="aiToggle(\''+pfx+i+'\')" style="display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;">'
          +chk
          +'<span style="flex:1;font-size:13px;font-weight:600;color:#131E2E;">'+esc(it['業務']||'')+'</span>'
          +bdg('優先 '+pr,pc(pr))+bdg('難易度 '+df,dc(df))
          +'<span id="'+pfx+i+'_a" style="color:#8AA0BE;font-size:12px;">▸</span>'
        +'</div>'
        +'<div id="'+pfx+i+'" style="display:none;padding:0 14px 12px;">'
          +rw('現状の課題',it['現状課題']||it['課題'])
          +rw('自動化案',it['自動化案'])
          +rw('推奨アプローチ',it['推奨アプローチ'])
          +rw('期待効果',it['期待効果'])
          +(it['月間削減目安']?rw('削減目安',it['月間削減目安']):'')
        +'</div>'
      +'</div>';
    });
    h+='<div style="font-size:11px;color:#8AA0BE;margin-top:6px;">※ AIが生成した提案です。実際の導入可否・効果は個別精査が必要です。</div>';
    if(selectable){ h+='<button class="btn2" style="margin-top:12px;" onclick="shareInterests()">選択した項目をコンサルに共有</button><div id="ai-share-msg" style="font-size:12px;margin-top:8px;"></div>'; }
    return h;
  }
  function aiToggle(id){ var d=$(id), a=$(id+'_a'); if(!d)return; var open=d.style.display!=='none'; d.style.display=open?'none':'block'; if(a)a.textContent=open?'▸':'▾'; }
  async function runAi(){
    var btn=$('ai-run'), result=$('ai-result');
    var gyo=$('ai-gyo').value.trim(), size=$('ai-size').value, note=$('ai-note').value.trim();
    var areas=Object.keys(aiSelected);
    if(areas.length===0 && !note){ result.innerHTML='<div style="font-size:12px;color:#A83030;">業務を1つ以上選ぶか、困りごとを入力してください。</div>'; return; }
    btn.disabled=true; var ot=btn.textContent; btn.textContent='AIが分析中...';
    result.innerHTML='<div style="padding:24px;text-align:center;color:#4A6080;font-size:13px;">AIが分析し、自動化案を作成しています...</div>';
    var sys='あなたは中小企業のバックオフィス改善とAI活用に精通したコンサルタントです。後継者不在も視野に入る黒字中小企業の生産性向上と財務貢献を目的に、現実的で着手しやすい自動化案を提案します。出力は指定されたJSON配列のみとし、前置き・後置き・コードフェンスを一切付けないこと。';
    var usr='対象企業の情報：\n業種・事業内容: '+(gyo||'（未記入）')+'\n従業員規模: '+size+'\n自動化を検討したい業務: '+(areas.length?areas.join('、'):'（指定なし）')+'\n具体的な困りごと: '+(note||'（特になし）')+'\n\nこの企業で、AIや軽量なデジタルツールで自動化・効率化できるバックオフィス業務を5件程度、効果の大きい順に提案してください。中小企業が無理なく始められる現実的な手段を優先し、推奨アプローチには「Claudeプロジェクト」「Custom GPT」「専用AIアシスタント」「RPA」「既存SaaS連携」など具体的な手段名を含めてください。\n\n必ず次の形式のJSON配列のみを出力（説明・コードフェンス禁止）：\n[{"業務":"...","現状課題":"...","自動化案":"...","推奨アプローチ":"...","期待効果":"...","難易度":"低|中|高","優先度":"高|中|低","月間削減目安":"例: 約20時間/月"}]';
    try{
      var res=await sb.functions.invoke('ai-proxy', { body: { system:sys, messages:[{role:'user',content:usr}], model:'claude-sonnet-4-6', max_tokens:2500 } });
      if(res.error){ result.innerHTML='<div style="font-size:12px;color:#A83030;line-height:1.6;">呼び出しエラー：'+esc(res.error.message||String(res.error))+'<br>Edge Function「ai-proxy」が未デプロイか、ANTHROPIC_API_KEY が未設定の可能性があります。</div>'; }
      else if(res.data && res.data.ok===false){ result.innerHTML='<div style="font-size:12px;color:#A83030;line-height:1.6;">'+esc(res.data.error||'エラーが発生しました')+'</div>'; }
      else { var txt=(res.data && res.data.text)||''; result.innerHTML=aiCards(txt, true); saveDiagnosis(txt); }
    }catch(e){ result.innerHTML='<div style="font-size:12px;color:#A83030;">エラー：'+esc(String((e&&e.message)||e))+'</div>'; }
    btn.disabled=false; btn.textContent=ot;
  }

    var btn=$('ma-run'), result=$('ma-result');
    var profit=$('ma-profit').value.trim(), biz=$('ma-biz').value.trim(), goal=$('ma-goal').value;
    if(!biz){ result.innerHTML='<div style="font-size:12px;color:#A83030;">事業内容・強みを入力してください。</div>'; return; }
    btn.disabled=true; var ot=btn.textContent; btn.textContent='AIが分析中...';
    result.innerHTML='<div style="padding:24px;text-align:center;color:#4A6080;font-size:13px;">AIがM&A活用の方向性を検討しています...</div>';
    var sys='あなたは中小企業のM&A・事業承継に詳しいアドバイザーです。黒字企業が利益・余剰資金をM&A（会社や事業の買収）で活かす現実的な方向性を提案します。スモールM&Aを前提に過大な案は避けます。出力は指定のJSON配列のみ、前置き・コードフェンス禁止。';
    var usr='企業情報：\n年間利益・余剰資金: '+(profit||'（未記入）')+'万円\n事業内容・強み: '+biz+'\nM&Aで実現したいこと: '+goal+'\n\nこの企業が利益をM&Aで活かす方向性を3〜5件、現実的な順に提案してください。\n\n必ず次の形式のJSON配列のみを出力：\n[{"方向性":"...","ターゲット像":"...","期待シナジー":"...","予算感":"例: 数百万〜数千万円","留意点":"..."}]';
    try{
      var res=await sb.functions.invoke('ai-proxy',{ body:{ system:sys, messages:[{role:'user',content:usr}], model:'claude-sonnet-4-6', max_tokens:2000 } });
      if(res.error){ result.innerHTML='<div style="font-size:12px;color:#A83030;">呼び出しエラー：'+esc(res.error.message||String(res.error))+'</div>'; }
      else if(res.data && res.data.ok===false){ result.innerHTML='<div style="font-size:12px;color:#A83030;">'+esc(res.data.error||'エラー')+'</div>'; }
      else { result.innerHTML=maCards((res.data&&res.data.text)||'', true); }
    }catch(e){ result.innerHTML='<div style="font-size:12px;color:#A83030;">エラー：'+esc(String((e&&e.message)||e))+'</div>'; }
    btn.disabled=false; btn.textContent=ot;
  }

  var RECOVERING = /type=recovery/.test(location.hash) || /type=recovery/.test(location.search);
  sb.auth.onAuthStateChange(function(event, session){ if(event==='PASSWORD_RECOVERY'){ RECOVERING=true; showRecovery(); } });

  (async function init(){
    if(RECOVERING){ showRecovery(); return; }
    var s=await sb.auth.getSession();
    if(s.data && s.data.session){ await routeFromSession(s.data.session); } else { showAuth(); }
  })();

  document.addEventListener('keydown', function(e){
    if(e.key!=='Enter') return;
    if(!$('gate').classList.contains('hidden')){
      if(!$('panel-login').classList.contains('hidden')) doLogin();
      else if(!$('panel-signup').classList.contains('hidden')) doSignup();
      else if(!$('panel-reset').classList.contains('hidden')) doReset();
      else if(!$('panel-recovery').classList.contains('hidden')) doUpdatePassword();
    }
  });
</script>
</body>
</html>
